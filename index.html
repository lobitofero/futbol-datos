// =====================================================
// 2) MOTOR DE PREDICCION (igual formula que la version Python)
// =====================================================
function probabilidadElo(eloA, eloB, ventajaLocal=65) {
  const dif = eloB - (eloA + ventajaLocal);
  return 1 / (1 + Math.pow(10, dif/400));
}

function golesEsperados(eqA, eqB, probEloA) {
  const fa = EQUIPOS[eqA], fb = EQUIPOS[eqB];
  const faAtaque = fa.ataque / PROMEDIO_GOLES_LIGA, faDefensa = fa.defensa / PROMEDIO_GOLES_LIGA;
  const fbAtaque = fb.ataque / PROMEDIO_GOLES_LIGA, fbDefensa = fb.defensa / PROMEDIO_GOLES_LIGA;
  let golesA = faAtaque * fbDefensa * PROMEDIO_GOLES_LIGA * (fa.forma || 1.0);
  let golesB = fbAtaque * faDefensa * PROMEDIO_GOLES_LIGA * (fb.forma || 1.0);
  const sesgo = probEloA - 0.5;
  golesA *= (1 + sesgo*0.45);
  golesB *= (1 - sesgo*0.45);
  return [golesA, golesB];
}

function factorial(n){ let r=1; for(let i=2;i<=n;i++) r*=i; return r; }
function poissonP(k, lam){ return Math.pow(lam,k)*Math.exp(-lam)/factorial(k); }

function tauDC(x, y, lamA, lamB, rho) {
  if (lamA <= 0 || lamB <= 0) return 1;
  return 1 + rho*(x-lamA)*(y-lamB)/(lamA*lamB);
}

function matrizMarcadores(golesA, golesB, maxGoles=8, rho=DIXON_COLES_RHO) {
  const matriz = {};
  let total = 0;
  for (let i=0;i<=maxGoles;i++){
    for (let j=0;j<=maxGoles;j++){
      let p = poissonP(i,golesA)*poissonP(j,golesB);
      if (i<=1 && j<=1) p *= tauDC(i,j,golesA,golesB,rho);
      p = Math.max(p,0);
      matriz[i+"-"+j] = p;
      total += p;
    }
  }
  for (const k in matriz) matriz[k] /= total;
  return matriz;
}

function resumenResultado(matriz){
  let pLocal=0,pEmpate=0,pVisita=0;
  for (const key in matriz){
    const [i,j] = key.split("-").map(Number);
    if (i>j) pLocal += matriz[key];
    else if (i===j) pEmpate += matriz[key];
    else pVisita += matriz[key];
  }
  return [pLocal,pEmpate,pVisita];
}

function topMarcadores(matriz, n=5){
  return Object.entries(matriz).sort((a,b)=>b[1]-a[1]).slice(0,n);
}

function probBTTS(matriz){
  let s=0;
  for (const key in matriz){
    const [i,j]=key.split("-").map(Number);
    if (i>0 && j>0) s += matriz[key];
  }
  return s;
}

function probOverUnder(matriz, linea=2.5){
  let over=0;
  for (const key in matriz){
    const [i,j]=key.split("-").map(Number);
    if (i+j > linea) over += matriz[key];
  }
  return over;
}

  ultimaPrediccion = {eqA, eqB};

  let html = `<div style="text-align:center;font-weight:bold;font-size:15px">${eqA} vs ${eqB}</div>`;
  if (fechaInput) html += `<div style="text-align:center;color:var(--text-muted);font-size:12px;margin-bottom:6px">${fechaInput}</div>`;
  html += `<div style="text-align:center;color:var(--text-muted);font-size:11px;margin-bottom:10px">Elo: ${eqA} ${eloA.toFixed(0)} | ${eqB} ${eloB.toFixed(0)}</div>`;
  html += `<div style="font-size:13px;margin-bottom:8px">xG: ${golesA.toFixed(2)} - ${golesB.toFixed(2)}</div>`;

  html += barra("Gana " + eqA, pLocal, "var(--green)");
  html += barra("Empate", pEmpate, "var(--yellow)");
  html += barra("Gana " + eqB, pVisita, "var(--red)");

  html += `<div class="titulo-seccion">Top 5 marcadores</div>`;
  top5.forEach(([marc, p])=>{
    html += `<div class="marcador-row"><span>${marc.replace("-"," - ")}</span><span>${(p*100).toFixed(1)}%</span></div>`;
  });

  html += barra("BTTS Si", btts, "var(--blue2)");
  html += barra("Over 2.5", over25, "var(--purple)");

  html += `<div class="resumen">Favorito: <b>${favorito}</b><br>Referencia estadistica, no una garantia.</div>`;

  resultadoDiv.style.display = "block";
  resultadoDiv.innerHTML = html;
}

function verPartidosProgramados(){
  document.getElementById("modalTitulo").textContent = "Partidos programados";
  if (!PARTIDOS_PROGRAMADOS.length){
    document.getElementById("modalTexto").innerHTML = "No hay partidos programados cargados todavia. Agrega 'partidos_programados' en tu datos.json de GitHub.";
    document.getElementById("modalBg").style.display = "flex";
    return;
  }
  let html = "";
  PARTIDOS_PROGRAMADOS.forEach((p, idx)=>{
    html += `<div style="padding:8px;border:1px solid #3a3a40;border-radius:8px;margin-bottom:6px;cursor:pointer"
                  onclick="elegirPartidoProgramado(${idx})">
               <div style="font-size:11px;color:var(--text-muted)">${p.fecha} ${p.hora || ""}</div>
               <div><b>${p.local}</b> vs <b>${p.visita}</b></div>
             </div>`;
  });
  document.getElementById("modalTexto").innerHTML = html;
  document.getElementById("modalBg").style.display = "flex";
}

function elegirPartidoProgramado(idx){
  const p = PARTIDOS_PROGRAMADOS[idx];
  document.getElementById("equipoLocal").value = p.local;
  document.getElementById("equipoVisita").value = p.visita;
  document.getElementById("fechaPartido").value = p.fecha;
  cerrarModal();
  predecir();
}
function verHistorial(cual){
  const eq = cual === "local" ? document.getElementById("equipoLocal").value : document.getElementById("equipoVisita").value;
  const partidos = HISTORIAL[eq];
  document.getElementById("modalTitulo").textContent = "Historial - " + eq;
  if (!partidos){
    document.getElementById("modalTexto").innerHTML = `No tengo historial reciente cargado para <b>${eq}</b>.<br><br>Por ahora solo cubre los equipos del Mundial 2026 en curso.`;
  } else {
    const bloques = partidos.map(p => {
      if (typeof p === "string") return p;
      let extra = `<b>${p.fecha}:</b> ${p.resultado}`;
      const partes = p.resultado.split(" - ");
      const nomIzq = partes[0] ? partes[0].split(" ").slice(0, -1).join(" ") : "Local";
      const nomDer = partes[1] ? partes[1].split(" ").slice(1).join(" ") : "Visita";
      const detalles = [];
      if (p.posesion) {
        const [a, b] = p.posesion.split(" - ");
        detalles.push(`Posesion: ${nomIzq} ${a} | ${nomDer} ${b}`);
      }
      if (p.remates) {
        const [a, b] = p.remates.split(" - ");
        const arco = (p.remates_arco || "- - -").split(" - ");
        detalles.push(`Remates: ${nomIzq} ${a} (arco ${arco[0]||"-"}) | ${nomDer} ${b} (arco ${arco[1]||"-"})`);
      }
      if (p.corners) {
        const [a, b] = p.corners.split(" - ");
        detalles.push(`Corners: ${nomIzq} ${a} | ${nomDer} ${b}`);
      }
      if (p.faltas) {
        const [a, b] = p.faltas.split(" - ");
        detalles.push(`Faltas: ${nomIzq} ${a} | ${nomDer} ${b}`);
      }
      if (p.tarjetas_am) {
        const [a, b] = p.tarjetas_am.split(" - ");
        detalles.push(`Amarillas: ${nomIzq} ${a} | ${nomDer} ${b}`);
      }
      if (p.goleador) detalles.push(`⚽ Goleador: ${p.goleador}`);
      if (p.curioso) detalles.push(`💡 ${p.curioso}`);
      if (detalles.length) extra += `<br><span style="color:var(--text-muted);font-size:12px">${detalles.join("<br>")}</span>`;
      return extra;
    });
    document.getElementById("modalTexto").innerHTML = bloques.join("<br><br>");
  }
  document.getElementById("modalBg").style.display = "flex";
}

function cerrarModal(){
  document.getElementById("modalBg").style.display = "none";
}

function actualizarEloReal(){
  if (!ultimaPrediccion){
    document.getElementById("modalTitulo").textContent = "Aviso";
    document.getElementById("modalTexto").textContent = "Primero presiona PREDECIR con los equipos que jugaron.";
    document.getElementById("modalBg").style.display = "flex";
    return;
  }
  const ga = parseInt(document.getElementById("golesLocal").value);
  const gv = parseInt(document.getElementById("golesVisita").value);
  if (isNaN(ga) || isNaN(gv)){
    document.getElementById("modalTitulo").textContent = "Aviso";
    document.getElementById("modalTexto").textContent = "Escribe el marcador real en Goles L y Goles V.";
    document.getElementById("modalBg").style.display = "flex";
    return;
  }
  const {eqA, eqB} = ultimaPrediccion;
  const eloA = ELO_ACTUAL[eqA], eloB = ELO_ACTUAL[eqB];
  const dr = (eloA + 65) - eloB;
  const weA = 1/(Math.pow(10, -dr/400)+1);
  let resultadoA;
  if (ga > gv) resultadoA = 1;
  else if (ga === gv) resultadoA = 0.5;
  else resultadoA = 0;
  const dif = Math.abs(ga-gv);
  const mult = dif<=1 ? 1 : (dif===2 ? 1.5 : (11+dif)/8);
  const k = K_BASE*mult;
  const delta = k*(resultadoA - weA);
  const nuevoA = Math.round((eloA+delta)*10)/10;
  const nuevoB = Math.round((eloB-delta)*10)/10;
  ELO_ACTUAL[eqA] = nuevoA;
  ELO_ACTUAL[eqB] = nuevoB;
  guardarEloLocal();

  document.getElementById("modalTitulo").textContent = "Elo actualizado";
  document.getElementById("modalTexto").innerHTML =
    `${eqA}: ${eloA.toFixed(0)} → ${nuevoA.toFixed(0)}<br>${eqB}: ${eloB.toFixed(0)} → ${nuevoB.toFixed(0)}<br><br>` +
    `<small>Esto solo se guardo en este celular. Si quieres que quede para siempre en todos tus dispositivos, edita datos.json en GitHub.</small>`;
  document.getElementById("modalBg").style.display = "flex";
  document.getElementById("golesLocal").value = "";
  document.getElementById("golesVisita").value = "";
}

// ---- inicio ----
llenarSelects();
cargarEloLocal();
cargarDatosGithub();
document.getElementById("fechaPartido").valueAsDate = new Date();
</script>
